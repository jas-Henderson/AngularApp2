<div class="form-container"> <!-- Main container for the appointment form -->
  <h2>Book an Appointment</h2>

  <form (ngSubmit)="submitAppointment()" #appointmentForm="ngForm">  <!-- Form submission handler -->
    <label for="clientName">Your Name</label>
    <input
      type="text"
      id="clientName"
      name="clientName"
      required
      [(ngModel)]="appointment.clientName"
    />

    <label for="service">Service</label> <!-- Dropdown for selecting the service -->
    <select
      id="service"
      name="service"
      required
      [(ngModel)]="appointment.service"
    >
      <option value="Haircut">Haircut</option>
      <option value="Color">Color</option>
      <option value="Styling">Styling</option>
    </select>

    <label for="stylist">Stylist</label> <!-- Dropdown for selecting the stylist -->
    <select
      id="stylist"
      name="stylist"
      required
      [(ngModel)]="appointment.stylist"
    >
      <option value="Ashley">Ashley</option>
      <option value="Jordan">Jordan</option>
      <option value="Casey">Casey</option>
    </select>

    <label for="time">Date and Time</label> <!-- Input for selecting the date and time -->
    <input
      type="datetime-local"
      id="time"
      name="time"
      required
      [(ngModel)]="appointment.time"
    />

    <button type="submit" [disabled]="appointmentForm.invalid">Book Now</button> <!-- Submit button, disabled if form is invalid -->
  </form>

  <div class="calendar-view"> <!-- Section to display upcoming appointments -->
    <h3>Upcoming Appointments</h3>
    <ul>
      <li *ngFor="let a of appointments"> <!-- Loop through appointments and display each one -->
        <strong>{{ a.time | date: 'short' }}</strong> -
        {{ a.clientName }} with {{ a.stylist }} ({{ a.service }})
      </li>
    </ul>
  </div>
</div>
